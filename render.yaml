# Render Blueprint — deploy backend as a Python web service.
# Usage: in Render dashboard → New + → Blueprint → Connect this repo.
services:
  - type: web
    name: psa-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: psuman_associates
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
    healthCheckPath: /api/
